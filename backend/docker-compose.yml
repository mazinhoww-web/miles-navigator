version: "3.9"

services:
  # ─── Banco de dados PostgreSQL ───────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: miles_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-milesradar}
      POSTGRES_USER: ${POSTGRES_USER:-milesradar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mudesuasenha123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-milesradar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Aplicação principal ──────────────────────────────────────────
  app:
    build: .
    container_name: miles_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app_logs:/app/logs
      - app_screenshots:/app/screenshots
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-milesradar}:${POSTGRES_PASSWORD:-mudesuasenha123}@postgres:5432/${POSTGRES_DB:-milesradar}

  # ─── Evolution API (WhatsApp) ─────────────────────────────────────
  evolution:
    image: atendai/evolution-api:latest
    container_name: miles_evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-mude-esta-chave-secreta}
      - DATABASE_ENABLED=false
      - LOG_LEVEL=ERROR
    volumes:
      - evolution_data:/evolution/instances

volumes:
  postgres_data:
  app_logs:
  app_screenshots:
  evolution_data:
  backups:
