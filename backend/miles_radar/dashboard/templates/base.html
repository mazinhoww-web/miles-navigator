<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Miles Radar{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #F59E0B; --gold-lt: #FEF3C7; --gold-dk: #92400E;
      --blue: #3B82F6; --green: #10B981; --red: #EF4444; --purple: #8B5CF6;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; }
    h1,h2,h3,.font-sora,
    .kpi-val, .kpi-label, .sidebar-brand { font-family: 'Sora', sans-serif; }
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .flash-pulse { animation: flash-glow 2s ease-in-out infinite; }
    @keyframes flash-glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); border-color: rgba(239,68,68,0.3); }
      50%      { box-shadow: 0 0 20px 2px rgba(239,68,68,0.25); border-color: rgba(239,68,68,0.7); }
    }
    .accent-bar { width: 3px; border-radius: 999px; }
    .prog-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .pill-smiles   { background:#FEF3C7; color:#92400E; }
    .pill-latam    { background:#EFF6FF; color:#1E40AF; }
    .pill-azul     { background:#EDE9FE; color:#4C1D95; }
    .pill-livelo   { background:#FFF1F2; color:#9F1239; }
    .pill-esfera   { background:#F0FDF4; color:#14532D; }
    .pill-default  { background:#1F2937; color:#9CA3AF; }
    .tier-bar-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }
    .nav-link { display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:500;color:#6B7280;text-decoration:none;transition:.15s; }
    .nav-link:hover { background:rgba(255,255,255,.06);color:#E5E7EB; }
    .nav-link.active { background:rgba(245,158,11,.12);color:#F59E0B; }
    .nav-link svg { width:16px;height:16px;flex-shrink:0; }
    .badge { padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600; }
    .badge-flash { background:rgba(239,68,68,.15);color:#EF4444; }
    .badge-excelente { background:rgba(16,185,129,.15);color:#10B981; }
    .badge-bom { background:rgba(59,130,246,.12);color:#60A5FA; }
    .badge-neutro { background:rgba(107,114,128,.15);color:#9CA3AF; }
    .tooltip { position:relative; }
    .tooltip:hover::after { content:attr(data-tip);position:absolute;bottom:110%;left:50%;transform:translateX(-50%);
      background:#1F2937;color:#E5E7EB;padding:4px 8px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:50;pointer-events:none; }
    @media(max-width:768px) { .sidebar { transform:translateX(-100%); } .sidebar.open { transform:translateX(0); } }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-950 text-white min-h-screen flex">

  <!-- Sidebar -->
  <aside class="sidebar fixed inset-y-0 left-0 z-40 w-56 bg-gray-900 border-r border-gray-800 flex flex-col transition-transform duration-200 md:translate-x-0">
    <div class="p-4 border-b border-gray-800">
      <div class="sidebar-brand flex items-center gap-2 text-base font-semibold">
        <div class="w-2 h-2 rounded-full" style="background:var(--gold)"></div>
        Miles Radar
      </div>
      <div class="text-xs text-gray-500 mt-0.5">Monitor de Campanhas</div>
    </div>

    <nav class="flex-1 p-3 space-y-0.5 overflow-y-auto">
      <a href="/" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
        Monitor
      </a>
      <a href="/analise-mensal" class="nav-link {% if active_page == 'analise_mensal' %}active{% endif %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
        Análise Mensal
      </a>
      <a href="/historico" class="nav-link {% if active_page == 'historico' %}active{% endif %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z"/></svg>
        Histórico
        <span class="ml-auto text-xs text-gray-600">Fase 3</span>
      </a>
      <a href="/vpp" class="nav-link {% if active_page == 'vpp' %}active{% endif %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        VPP
        <span class="ml-auto text-xs text-gray-600">Fase 4</span>
      </a>
      <a href="/previsao" class="nav-link {% if active_page == 'previsao' %}active{% endif %}">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.61L5 14.5"/></svg>
        Previsão
        <span class="ml-auto text-xs text-gray-600">Fase 5</span>
      </a>
      <div class="pt-2 mt-2 border-t border-gray-800">
        <a href="/status" class="nav-link {% if active_page == 'status' %}active{% endif %}">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 01-3-3m3 3a3 3 0 100 6h13.5a3 3 0 100-6m-16.5-3a3 3 0 013-3h13.5a3 3 0 013 3m-19.5 0a4.5 4.5 0 01.9-2.7L5.737 5.1a3.375 3.375 0 012.7-1.35h7.126c1.062 0 2.062.5 2.7 1.35l2.587 3.45a4.5 4.5 0 01.9 2.7m0 0a3 3 0 01-3 3m0 3h.008v.008h-.008v-.008zm0-6h.008v.008h-.008v-.008zm-3 6h.008v.008h-.008v-.008zm0-6h.008v.008h-.008v-.008z"/></svg>
          Status
          <span id="nav-status-dot" class="ml-auto w-2 h-2 rounded-full bg-green-500"></span>
        </a>
      </div>
    </nav>

    <div class="p-3 border-t border-gray-800 text-xs text-gray-600">
      Miles Radar v1.0 · Fase 2
    </div>
  </aside>

  <!-- Mobile overlay -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden" onclick="toggleSidebar()"></div>

  <!-- Main -->
  <div class="flex-1 md:ml-56 flex flex-col min-h-screen">

    <!-- Top bar -->
    <header class="sticky top-0 z-20 bg-gray-950/80 backdrop-blur border-b border-gray-800 px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white p-1">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <span class="text-sm font-medium text-gray-300">{% block page_title %}{% endblock %}</span>
      </div>
      <div class="flex items-center gap-2">
        <div id="online-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
        <span class="text-xs text-gray-500" id="online-label">Conectado</span>
        <span class="text-xs text-gray-600 ml-3" id="last-update"></span>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 p-4 md:p-6 overflow-auto">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    function toggleSidebar() {
      const s = document.querySelector('.sidebar');
      const o = document.getElementById('sidebar-overlay');
      s.classList.toggle('open');
      o.classList.toggle('hidden');
    }
    function setLastUpdate() {
      const el = document.getElementById('last-update');
      if(el) el.textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    }
    function pillClass(prog) {
      if(!prog) return 'pill-default';
      const p = prog.toLowerCase();
      if(p.includes('smiles')) return 'pill-smiles';
      if(p.includes('latam')) return 'pill-latam';
      if(p.includes('azul')) return 'pill-azul';
      if(p.includes('livelo')) return 'pill-livelo';
      if(p.includes('esfera')) return 'pill-esfera';
      return 'pill-default';
    }
    const TYPE_LABELS = {
      transfer_bonus:'Transf. Bonificada', direct_purchase:'Compra Direta',
      club_combo:'Combo Clube', flash_sale:'Flash Sale',
      club_signup:'Adesão Clube', other:'Promoção'
    };
    function fmtDate(iso) {
      if(!iso) return '';
      return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    }
    setLastUpdate();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
